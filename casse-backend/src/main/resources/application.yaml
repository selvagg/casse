spring:
  application:
    name: casse
  elasticsearch:
    uris: http://localhost:9200
  session:
    store-type: redis
    redis:
      namespace: casse-sessions
      configure-action: none

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

  data:
    redis:
      url: redis://redis:6666

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${CASSE_EMAIL}
    password: ${CASSE_EMAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

casse:
  pending:
    approval:
      ttl: P30D
  approvers: approvers-emails-as-comma-separated-string
  base-url: ${CASSE_BASE_URL} # Changed to environment variable

server:
  tomcat:
    max-swallow-size=100MB:

cloudflare:
  r2:
    access-key: ${CLOUDFARE_ACCESS_KEY}
    secret-key: ${CLOUDFARE_SECRET_KEY}
    region: auto
    bucket-name: casse-audio
    endpoint: ${CLOUDFARE_R2_ENDPOINT}

oauth:
  google:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID}   # must match the iOS app's Google OAuth client ID

jwt:
  secret: ${JWT_SECRET}                    # 256-bit+ random string, from secrets manager
  access-token-expiry-seconds: 3600
  refresh-token-expiry-seconds: 604800     # 7 days - see note in JwtService re: no revocation