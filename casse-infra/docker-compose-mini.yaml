version: "3.8"

services:
  redis:
    image: redis:latest
    container_name: casse-redis
    ports:
      - "6666:6379"
    networks:
      - casse-network

  minio:
    image: minio/minio:latest
    container_name: casse-minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # MinIO Web UI
    volumes:
      - minio-data:/data
    networks:
      - casse-network

  minio-create-bucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 admin password;
      /usr/bin/mc mb local/casse-audio;
      /usr/bin/mc policy set public local/casse-audio;
      exit 0;
      "
    networks:
      - casse-network

  elasticsearch1:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.4
    container_name: elasticsearch1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data1:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - casse-network

  data-generator:
    build:
      context: ./elk
      dockerfile: dump-data/Dockerfile
    container_name: data-generator
    depends_on:
      - elasticsearch1
    networks:
      - casse-network
    restart: "no"

networks:
  casse-network:
    driver: bridge
    name: casse-network

volumes:
  minio-data:
    driver: local
  es-data1:
    driver: local
